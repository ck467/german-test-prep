          "name": "How many questions are on the Einbürgerungstest?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The official Einbürgerungstest consists of 33 questions drawn from a pool of 300 general knowledge questions plus 10 state-specific questions for your Bundesland. You need at least 17 correct answers (over 50%) to pass. The test takes 60 minutes."
          }
        },
        {
          "@type": "Question",
          "name": "What is the B1 German exam, and which version should I take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "B1 is the intermediate level of the Common European Framework of Reference (CEFR) for languages. The two most widely accepted exams are the Goethe-Zertifikat B1 and the telc Deutsch B1. Both test reading, listening, writing, and speaking. Either certificate is accepted for the German citizenship application."
          }
        },
        {
          "@type": "Question",
          "name": "Is the B1 German exam required for German citizenship?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Under the Staatsangehörigkeitsgesetz (StAG), applicants must demonstrate German language skills at B1 level or higher. You can prove this with a Goethe-Zertifikat B1, telc Deutsch B1, or an equivalent recognized certificate."
          }
        },
        {
          "@type": "Question",
          "name": "How long do you have to live in Germany to apply for citizenship?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The standard requirement is 8 years of lawful habitual residence in Germany. This can be reduced to 7 years with an integration course, or to 6 years with special integration achievements. Spouses of German citizens may apply after 3 years of residence."
          }
        },
        {
          "@type": "Question",
          "name": "What documents do I need for the German citizenship application?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Typical documents include a valid passport, birth certificate, proof of residence (Meldebescheinigung), B1 language certificate, Einbürgerungstest certificate, proof of income or employment, proof of pension contributions, and a clean criminal record. Requirements can vary by state."
          }
        },
        {
          "@type": "Question",
          "name": "Is dual citizenship allowed in Germany?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Since the reform of June 2024, Germany generally allows dual citizenship for all naturalization applicants. You can keep your current nationality when naturalizing as a German citizen."
          }
        }
      ]
    }

    <!-- Restore SPA path after GitHub Pages 404.html redirect -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        } else {
          var q = window.location.search;
          if (q && q[1] === '/') {
            var decoded = q.slice(2).split('&').map(function(s) {
              return s.replace(/~and~/g, '&');
            }).join('?');
            window.history.replaceState(null, null,
              window.location.pathname + decoded + window.location.hash
            );
          }
        }
      })();
