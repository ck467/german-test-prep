<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>German Citizenship Prep — Free Study Tools</title>
    <meta name="description" content="Free study tools for the German citizenship journey — Einbürgerungstest practice, B1 German exam prep, and eligibility checker." />
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9KTSTHKDTZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9KTSTHKDTZ');
    </script>
  </head>
  <body>
    <!-- Restore SPA path after GitHub Pages 404.html redirect -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        } else {
          var q = window.location.search;
          if (q && q[1] === '/') {
            var decoded = q.slice(2).split('&').map(function(s) {
              return s.replace(/~and~/g, '&');
            }).join('?');
            window.history.replaceState(null, null,
              window.location.pathname + decoded + window.location.hash
            );
          }
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
